version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartfinance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartfinance_network
    mem_limit: 200m
    mem_reservation: 128m
    cpus: 0.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfinance"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: smartfinance_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - smartfinance_network
    mem_limit: 180m
    mem_reservation: 96m
    cpus: 0.2
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: smartfinance-backend:latest
    container_name: smartfinance_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - '127.0.0.1:5000:5000'
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      Messaging__RabbitMq__Enabled: 'true'
      Messaging__RabbitMq__ConnectionUri: ${RABBITMQ_CONNECTION_URI}
      Messaging__RabbitMq__PrefetchCount: 1
      Messaging__RabbitMq__PublisherBatchSize: 20
      Messaging__RabbitMq__PublisherPollIntervalSeconds: 5
      Messaging__RabbitMq__ConsumerMaxRetries: 3
      Messaging__RabbitMq__PublisherMaxRetries: 5
      Messaging__RabbitMq__RetryDelaySeconds: 30
    networks:
      - smartfinance_network
    mem_limit: 300m
    mem_reservation: 200m
    cpus: 0.4
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
        - NEXT_PUBLIC_SIGNALR_URL=/financehub
        - NEXT_PUBLIC_PAYMENT_API_URL=/api/v1/payments
        - BACKEND_URL=http://backend:5000
    image: smartfinance-frontend:latest
    container_name: smartfinance_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_SIGNALR_URL: /financehub
      NEXT_PUBLIC_PAYMENT_API_URL: /api/v1/payments
      BACKEND_URL: http://backend:5000
    networks:
      - smartfinance_network
    mem_limit: 200m
    mem_reservation: 128m
    cpus: 0.3
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  smartfinance_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

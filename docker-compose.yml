version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartfinance}
      POSTGRES_USER: ${POSTGRES_USER:-smartfinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfinance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-smartfinance}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-smartfinance-rabbit}
    ports:
      - '127.0.0.1:5672:5672'
      - '127.0.0.1:15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - '5000:5000'
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      DATABASE_URL: postgres://${POSTGRES_USER:-smartfinance}:${POSTGRES_PASSWORD:-smartfinance}@postgres:5432/${POSTGRES_DB:-smartfinance}
      DB_SSL: 'false'
      ALLOWED_ORIGINS: http://localhost:3000
      JWT_ISSUER: ${JWT_ISSUER:-SmartFinance}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-SmartFinanceUsers}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-secret-before-production-use}
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: Lax
      Messaging__RabbitMq__Enabled: 'true'
      Messaging__RabbitMq__ConnectionUri: amqp://${RABBITMQ_USER:-smartfinance}:${RABBITMQ_PASSWORD:-smartfinance-rabbit}@rabbitmq:5672
      Messaging__RabbitMq__PrefetchCount: 1
      Messaging__RabbitMq__PublisherBatchSize: 20
      Messaging__RabbitMq__PublisherPollIntervalSeconds: 5
      Messaging__RabbitMq__ConsumerMaxRetries: 3
      Messaging__RabbitMq__PublisherMaxRetries: 5
      Messaging__RabbitMq__RetryDelaySeconds: 30

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_SIGNALR_URL: /financehub
        NEXT_PUBLIC_PAYMENT_API_URL: /api/v1/payments
        BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      NEXT_PUBLIC_SIGNALR_URL: /financehub
      NEXT_PUBLIC_PAYMENT_API_URL: /api/v1/payments
      BACKEND_URL: http://backend:5000

volumes:
  postgres_data:

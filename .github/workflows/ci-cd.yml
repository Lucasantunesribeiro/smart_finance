name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Type check
        run: npm run type-check
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_SIGNALR_URL: /financehub
          NEXT_PUBLIC_PAYMENT_SERVICE_URL: /payment

  microservice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: microservice/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: microservice
      - name: Syntax check
        run: node --check server.js
        working-directory: microservice

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore SmartFinance.sln
        working-directory: backend
      - name: Build
        run: dotnet build SmartFinance.sln --no-restore --configuration Release
        working-directory: backend
      - name: Test
        run: dotnet test SmartFinance.sln --no-build --configuration Release --verbosity normal
        working-directory: backend

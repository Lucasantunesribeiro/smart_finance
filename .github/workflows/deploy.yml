name: Deploy SmartFinance to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/smartfinance

            # Pull latest code
            git pull origin main

            # Build updated images and restart containers
            docker compose build
            docker compose up -d

            # Show container status
            echo "=== Container Status ==="
            docker compose ps

            # Basic health check
            sleep 10
            curl -fs http://localhost/health || echo "WARNING: health check failed"

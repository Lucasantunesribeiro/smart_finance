name: Deploy SmartFinance to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/smartfinance

            # Initialize git on first CI/CD deploy
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Lucasantunesribeiro/smart_finance.git
            fi

            # Pull latest code (.env is untracked so git won't touch it)
            git fetch origin main
            git reset --hard origin/main

            # Build and restart using EC2-optimized compose + existing .env
            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml build
            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml up -d

            echo "=== Container Status ==="
            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml ps

            sleep 10
            curl -fs http://localhost/health || echo "WARNING: health check failed"

name: Deploy SmartFinance to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            cd /opt/smartfinance

            # Configure git remote with token auth (works for public and private repos)
            if [ ! -d .git ]; then
              git init
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Lucasantunesribeiro/smart_finance.git"
            else
              git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Lucasantunesribeiro/smart_finance.git"
            fi

            git fetch origin main
            git reset --hard origin/main

            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml build
            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml up -d

            echo "=== Container Status ==="
            docker compose -f infrastructure/aws-free-tier/docker-compose.ec2.yml ps

            sleep 10
            curl -fs http://localhost/health || echo "WARNING: health check failed"

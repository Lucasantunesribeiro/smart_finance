name: Deploy SmartFinance to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 25m
          script: |
            set -e
            cd /opt/smartfinance

            # Configure git remote with token auth (works for public and private repos)
            if [ ! -d .git ]; then
              git init
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/Lucasantunesribeiro/smart_finance.git"
            else
              git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/Lucasantunesribeiro/smart_finance.git"
            fi

            git fetch origin main
            git reset --hard origin/main

            # Load production env vars so docker compose can substitute ${VAR} references
            # (includes RABBITMQ_CONNECTION_URI and all other runtime secrets)
            # This file must be pre-created on the server; it is never committed to git.
            ENV_FILE="infrastructure/aws-free-tier/.env.production"
            if [ ! -f "$ENV_FILE" ]; then
              echo "ERROR: $ENV_FILE not found on the server."
              echo "Create it from .env.production.example before deploying:"
              echo "  scp .env.production ubuntu@<EC2_HOST>:/opt/smartfinance/infrastructure/aws-free-tier/.env.production"
              exit 1
            fi
            set -a
            source "$ENV_FILE"
            set +a

            docker compose --project-directory . -f infrastructure/aws-free-tier/docker-compose.ec2.yml build
            docker compose --project-directory . -f infrastructure/aws-free-tier/docker-compose.ec2.yml up -d --remove-orphans

            echo "=== Container Status ==="
            docker compose --project-directory . -f infrastructure/aws-free-tier/docker-compose.ec2.yml ps

            sleep 10
            curl -fs http://localhost/health || echo "WARNING: health check failed"
